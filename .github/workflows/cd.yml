name: CD

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Set gem version from tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          ruby -i -pe "gsub(/spec\\.version\\s*=\\s*\\\"[^\\\"]+\\\"/, 'spec.version       = \\\"' + ENV.fetch('TAG_VERSION') + '\\\"')" imdhemy-jekyll-theme.gemspec
          echo "using release version ${TAG_VERSION}"
        env:
          TAG_VERSION: ${{ github.ref_name }}

      - name: Install Node dependencies
        run: npm ci

      - name: Build JavaScript assets
        run: npm run js:build

      - name: Verify Jekyll build
        run: bundle exec jekyll build --source example --config example/_config.yml --destination /tmp/imdhemy-theme-site

      - name: Build gem
        run: gem build imdhemy-jekyll-theme.gemspec

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials <<CREDENTIALS
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          CREDENTIALS
          chmod 0600 ~/.gem/credentials

      - name: Publish gem
        run: |
          GEM_FILE=$(ls -1 imdhemy-jekyll-theme-*.gem | head -n 1)
          gem push "${GEM_FILE}"
