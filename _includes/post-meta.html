{% assign meta_class = include.class_name | default: "post-meta" %}
<p class="{{ meta_class }}">
    <span class="meta-chip">
        <svg class="meta-chip__icon"
             viewBox="0 0 24 24"
             aria-hidden="true"
             focusable="false">
            <path d="M7 2a1 1 0 0 1 1 1v1h8V3a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h1V3a1 1 0 0 1 1-1zm13 8H4v9a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-9zM5 6a1 1 0 0 0-1 1v1h16V7a1 1 0 0 0-1-1h-1v1a1 1 0 1 1-2 0V6H8v1a1 1 0 1 1-2 0V6H5z"/>
        </svg>
        <span>{{ include.date | date: "%b %-d, %Y" }}</span>
    </span>
    <span class="meta-chip meta-chip--reading">
        <svg class="meta-chip__icon"
             viewBox="0 0 24 24"
             aria-hidden="true"
             focusable="false">
            <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20zm0 2a8 8 0 1 0 0 16 8 8 0 0 0 0-16zm0 3a1 1 0 0 1 1 1v3.59l2.7 2.7a1 1 0 1 1-1.4 1.42l-3-3A1 1 0 0 1 11 12V8a1 1 0 0 1 1-1z"/>
        </svg>
        <span>{{ include.reading_minutes }} min read</span>
    </span>
</p>
