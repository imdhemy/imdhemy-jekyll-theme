<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% include seo-meta.html %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/main.css?v=' | append: site.github.build_revision | relative_url }}">
    {% if site.favicon %}
    <link rel="icon" type="image/png" href="{{ site.favicon | relative_url }}">
    {% endif %}
    {% if page.math %}
    {% include math.html %}
    {% endif %}

    {% include structured-data.html %}

</head>
<body class="theme-body">
<a class="skip-link" href="#main-content">Skip to content</a>
<div class="theme-shell">
    {% include header.html %}
    <main id="main-content" tabindex="-1">
        {{ content }}
    </main>
    {% include footer.html %}
</div>

<!-- Main JS file -->
<script src="{{ '/assets/js/dist/main.js?v=' | append: site.github.build_revision | relative_url }}"></script>
</body>
</html>
