theme: "imdhemy-jekyll-theme"
baseurl: "/example"
title: "Imdhemy"
description: "A simple and clean Jekyll theme for your blog"
github:
  build_revision: "1.0.0"

author:
  name: "Dhemy"
  description: |
    I'm a software artist, fullstack (BE heavy) with 10 years of experience in software development. 
    Passionate about open source, blogging, and reading.
  avatar: "/images/theme/avatar.jpeg"

favicon: "/images/theme/favicon.png"

navigation:
  - title: "Home"
    url: "/"
  - title: "Blog"
    url: "/blog"
  - title: "About"
    url: "/about"

contributions:
  - name: "Laravel"
    url: "https://laravel.com"
    logo: "/images/theme/laravel.png"

  - name: "Spatie"
    url: "https://spatie.be/open-source"
    logo: "/images/theme/spatie.png"

  - name: "Siklid"
    url: "https://docs.siklid.io/"
    logo: "/images/theme/siklid.png"

  - name: "Google Play Billing"
    url: "https://github.com/imdhemy/google-play-billing"
    logo: "/images/theme/google-play-billing.png"

  - name: "App Store IAP"
    url: "https://github.com/imdhemy/appstore-iap"
    logo: "/images/theme/app-store-iap.png"

  - name: "Laravel In-app Purchase"
    url: "https://imdhemy.com/laravel-iap-docs/"
    logo: "/images/theme/liap.png"

