footer:
  bg_image: "/images/theme/social.png"
  social:
    - icon: "logo-github"
      url: "https://github.com/imdhemy"
    - icon: "logo-twitter"
      url: "https://twitter.com/imdhemy"
    - icon: "logo-linkedin"
      url: "https://www.linkedin.com/in/imdhemy/"
    - icon: "logo-youtube"
      url: "https://www.youtube.com/@imdhemy"

theme_style:
  accent: "#3b82f6"
  accent_strong: "#2563eb"
  accent_soft: "#dbeafe"
  accent_surface: "#eff6ff"
  success: "#16a34a"
  info: "#2563eb"
  warning: "#d97706"
  danger: "#dc2626"
  background: "#eef4ff"
  surface: "#ffffff"
  text: "#0f172a"
  muted: "#475569"
  border: "#c9d8f2"

theme_comments:
  enabled: true
  provider: "giscus"
  giscus:
    host: "https://giscus.app"
    repo: "imdhemy/imdhemy-jekyll-theme"
    repo_id: "R_kgDOIoR9Mg"
    category: "General"
    category_id: "DIC_kwDOIoR9Ms4C38z4"
    mapping: "pathname"
    term: ""
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: "bottom"
    theme: "preferred_color_scheme"
    lang: "en"
    loading: "lazy"

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-archives

paginate: 1
paginate_path: "/blog/page:num/"
markdown: kramdown

jekyll-archives:
  enabled:
    - categories
    - tags
  layout: "archive"
  permalinks:
    tag: '/tag/:name/'
    category: '/category/:name/'
